<app-card title="Tom e Escala">

    <app-tone-and-scale-help-modal appCardHelp></app-tone-and-scale-help-modal>

    <div class="tone-selector-row">
        <app-tone-selector
            [key]="state.key()"
            (keyChange)="state.key.set($event)">
        </app-tone-selector>
    </div>
    <section class="select_options">
        <select name="scale" id="scale_select"
            [ngModel]="state.scaleSelected()"
            (ngModelChange)="state.scaleSelected.set($event)">
            <option value="major">Maior</option>
            <option value="penta">Penta</option>
            <option value="penta_blues">Penta Blues</option>
        </select>
    </section>
    <section class="radio_options">
        <fieldset id="scale_fieldset">
            <span class="radio_option">
                <input type="radio" id="major_radio" name="scale" value="major"
                    [ngModel]="state.scaleSelected()"
                    (ngModelChange)="state.scaleSelected.set($event)">
                <label for="major_radio">Maior</label>
            </span>
            <span class="radio_option">
                <input type="radio" id="penta_radio" name="scale" value="penta"
                    [ngModel]="state.scaleSelected()"
                    (ngModelChange)="state.scaleSelected.set($event)">
                <label for="penta_radio">Penta</label>
            </span>
            <span class="radio_option">
                <input type="radio" id="penta_blues_radio" name="scale" value="penta_blues"
                    [ngModel]="state.scaleSelected()"
                    (ngModelChange)="state.scaleSelected.set($event)">
                <label for="penta_blues_radio">Penta Blues</label>
            </span>
        </fieldset>
    </section>
</app-card>
