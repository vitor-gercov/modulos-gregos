<div class="card">

        <div class="card__title-group">
            <h2 appSectionTitle>{{ title() }}</h2>
            @if (subtitle()) {
            <span class="card__subtitle">{{ subtitle() }}</span>
            }
        </div>

        <ng-content select="[appCardHelp]"></ng-content>
    </div>

    <ng-content></ng-content>
</div>
