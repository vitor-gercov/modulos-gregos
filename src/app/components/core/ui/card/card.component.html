<div class="card">
    <div class="card-header">
        <div class="card-title-group">
            <span appSectionTitle>{{ title() }}</span>
            @if (subtitle()) {
                <span class="card-subtitle">{{ subtitle() }}</span>
            }
        </div>

        <ng-content select="[appCardHelp]"></ng-content>
    </div>

    <ng-content></ng-content>
</div>
