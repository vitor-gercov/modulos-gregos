<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Scales and Shapes.com</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <!--
    Script inline de inicialização de tema — deve ser o PRIMEIRO elemento executável.
    Roda antes de qualquer frame pintado, evitando FOUC (Flash of Unstyled Content)
    tanto no carregamento inicial quanto em trocas de locale (i18n no futuro).
    Persiste a escolha via localStorage; no primeiro acesso usa prefers-color-scheme.
    O tema padrão do sistema é escuro.
  -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('theme');
        var theme =
          stored === 'light' || stored === 'dark'
            ? stored
            : window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
        document.documentElement.setAttribute('data-theme', theme);
        // Pinta o fundo imediatamente para que, mesmo antes do CSS carregar
        // (ex.: durante troca de locale no i18n), não haja flash de fundo branco.
        document.documentElement.style.backgroundColor =
          theme === 'dark' ? '#1c1c1c' : '#f5f5f5';
      } catch (_) { }
    })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body class="mat-typography">
  <app-root></app-root>
</body>

</html>
