<button class="help-modal__trigger" type="button" [attr.aria-label]="ariaLabel()" (click)="open()">
    <svg class="help-modal__trigger-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/>
        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
        <circle cx="12" cy="17" r=".5" fill="currentColor"/>
    </svg>
    <span>{{ label() }}</span>
</button>

<dialog #dialog class="help-modal__dialog" (click)="onBackdropClick($event)">
    <div class="help-modal__content">
        <div class="help-modal__header">
            <div class="help-modal__title-group">
                <h2 class="help-modal__title">{{ title() }}</h2>
                @if (subtitle()) {
                    <p class="help-modal__subtitle">{{ subtitle() }}</p>
                }
            </div>
            <button class="help-modal__close" type="button" (click)="close()" aria-label="Fechar">
                <svg class="help-modal__close-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <path d="M18 6 6 18M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <div class="help-modal__body">
            <ng-content />
        </div>
    </div>
</dialog>
