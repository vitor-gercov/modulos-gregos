<div class="field-select">
    <label class="field-select__label" for="string_count_select">
        Quantidade de cordas
    </label>
    <select class="select-input" id="string_count_select" name="string_count_select" [ngModel]="stringCount()"
        (ngModelChange)="stringCount.set(+$event)">
        <option [value]="6">6 cordas</option>
        <option [value]="5">5 cordas</option>
        <option [value]="4">4 cordas</option>
    </select>
</div>
<div class="field-radios">
    <fieldset class="fieldset">
        <legend class="fieldset__legend">
            Quantidade de cordas
        </legend>
        <span class="radio-option">
            <input class="radio-option__input" type="radio" id="string_count_6" name="string_count" [value]="6"
                [ngModel]="stringCount()" (ngModelChange)="stringCount.set($event)">
            <label class="radio-option__label" for="string_count_6"
                [class.radio-option__label--active]="stringCount() === 6">
                6 cordas
            </label>
        </span>
        <span class="radio-option">
            <input class="radio-option__input" type="radio" id="string_count_5" name="string_count" [value]="5"
                [ngModel]="stringCount()" (ngModelChange)="stringCount.set($event)">
            <label class="radio-option__label" for="string_count_5"
                [class.radio-option__label--active]="stringCount() === 5">
                5 cordas
            </label>
        </span>
        <span class="radio-option">
            <input class="radio-option__input" type="radio" id="string_count_4" name="string_count" [value]="4"
                [ngModel]="stringCount()" (ngModelChange)="stringCount.set($event)">
            <label class="radio-option__label" for="string_count_4"
                [class.radio-option__label--active]="stringCount() === 4">
                4 cordas
            </label>
        </span>
    </fieldset>
</div>
